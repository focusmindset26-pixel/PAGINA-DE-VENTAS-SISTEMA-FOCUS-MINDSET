<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Mindset - Sistema de Transformación</title>
    <script>
      // Prevent crash in environments/sandboxed iframes where standard window.fetch is a read-only getter
      (function() {
        try {
          var originalFetch = window.fetch;
          var customFetch = null;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return customFetch || originalFetch;
            },
            set: function(val) {
              customFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Unable to patch window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
